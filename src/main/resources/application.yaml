spring:
  application:
    name: ${SPRING_APPLICATION_NAME:awsS3FileUpload}

  datasource:
    url: jdbc:mysql://localhost:3306/aws_s3_file_upload?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true


  servlet:
    multipart:
      max-file-size: 150MB
      max-request-size: 150MB

jwt:
  secret: ${JWT_SECRET_KEY}
  expiration: ${JWT_EXPIRATION_TIME}

amazon:
  s3:
    access-key: ${AWS_ACCESS_KEY}
    secret-key: ${AWS_SECRET_KEY}
    bucket: ${AWS_BUCKET_NAME}
    region: ${AWS_REGION_NAME}

razorpay:
  key: ${RAZORPAY_KEY_ID}
  secret: ${RAZORPAY_KEY_SECRET}

