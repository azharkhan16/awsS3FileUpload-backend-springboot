spring:
  application:
    name: awsS3FileUpload

  datasource:
    url: jdbc:mysql://localhost:3306/aws_s3_file_upload?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true


  servlet:
    multipart:
      max-file-size: 150MB
      max-request-size: 150MB

amazon:
  s3:
    access-key: ${AWS_ACCESS_KEY}
    secret-key: ${AWS_SECRET_KEY}
    bucket: ${AWS_BUCKET_NAME}
    region: ${AWS_REGION_NAME}

